name: Ubuntu Dotfile Image

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      user_workflow_changed: ${{ steps.classify.outputs.user_workflow_changed }}
      dotfile_image_inputs_changed: ${{ steps.classify.outputs.dotfile_image_inputs_changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify workflow inputs
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "user_workflow_changed=true"
              echo "dotfile_image_inputs_changed=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "user_workflow_changed=$(bash hack/user_workflow_changed.sh head)" >> "$GITHUB_OUTPUT"
          echo "dotfile_image_inputs_changed=$(bash hack/dotfile_image_inputs_changed.sh head)" >> "$GITHUB_OUTPUT"

  ubuntu-dotfile:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.dotfile_image_inputs_changed == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Collect image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/petejohn6/ubuntu-dotfile
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ci/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
