name: Ubuntu Dotfile Image

on:
  pull_request:
    paths:
      - .dockerignore
      - .dotter/**
      - bootstrap/**
      - bootstrap-up.sh
      - ci/image/**
      - justfile
      - packages/**
      - script/**
      - .github/workflows/ubuntu-dotfile.yml
  push:
    paths:
      - .dockerignore
      - .dotter/**
      - bootstrap/**
      - bootstrap-up.sh
      - ci/image/**
      - justfile
      - packages/**
      - script/**
      - .github/workflows/ubuntu-dotfile.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ubuntu-dotfile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Collect image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/petejohn6/ubuntu-dotfile
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: ${{ github.ref_name == github.event.repository.default_branch && github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ci/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_name == github.event.repository.default_branch && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
