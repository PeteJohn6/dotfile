# WezTerm-inspired status line logic.

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left-length 96
set -g status-right-length 120

# Keep conditionals text-only to avoid tmux rendering raw style fragments.
set -g status-left '#[fg=#1c1b19,bg=#fab387,bold]#{?client_prefix, 󰌆 LEADER ,}#[default]#[fg=#1c1b19,bg=#fab387,bold]#{?#{&&:#{!=:#{client_key_table},root},#{!=:#{client_key_table},prefix}}, 󱏅 #{client_key_table} ,}#[default]'
set -g status-right '#[fg=#1c1b19,bg=#fab387,bold] #S #[default]'

setw -g window-status-separator " "
setw -g window-status-format "#[fg=#cdd6f4,bg=#45475A,bold]  #I #{=|24|:window_name}#{?window_activity_flag, !,}#{?window_bell_flag, *,} #[default]"
setw -g window-status-current-format "#[fg=#11111B,bg=#A4CF4A,bold]  #I #{=|24|:window_name} #[default]"
