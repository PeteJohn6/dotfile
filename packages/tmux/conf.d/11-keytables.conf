# WezTerm-style grouped key tables.

# window ~= WezTerm tab
bind -T tmux-window t new-window -c "#{pane_current_path}"
bind -T tmux-window , previous-window
bind -T tmux-window . next-window
bind -T tmux-window w kill-window
bind -T tmux-window e choose-tree -Zw
bind -T tmux-window r command-prompt -I "#W" "rename-window -- '%%'"
bind -T tmux-window q display-message "window mode cancelled"
bind -T tmux-window Escape display-message "window mode cancelled"

# pane ~= WezTerm pane
bind -T tmux-pane s split-window -h -c "#{pane_current_path}"
bind -T tmux-pane v split-window -v -c "#{pane_current_path}"
bind -T tmux-pane h select-pane -L
bind -T tmux-pane j select-pane -D
bind -T tmux-pane k select-pane -U
bind -T tmux-pane l select-pane -R
bind -T tmux-pane H resize-pane -L 5
bind -T tmux-pane J resize-pane -D 5
bind -T tmux-pane K resize-pane -U 5
bind -T tmux-pane L resize-pane -R 5
bind -T tmux-pane Enter resize-pane -Z
bind -T tmux-pane w kill-pane
bind -T tmux-pane e display-panes
bind -T tmux-pane q display-message "pane mode cancelled"
bind -T tmux-pane Escape display-message "pane mode cancelled"

# session ~= WezTerm domain/workspace
bind -T tmux-session s choose-tree -Zs
bind -T tmux-session n run-shell -b "bash ~/.tmux.d/bin/session-from-path.sh '#{pane_current_path}'"
bind -T tmux-session r command-prompt -I "#S" "rename-session -- '%%'"
bind -T tmux-session w confirm-before -p "kill session #S? (y/n)" kill-session
bind -T tmux-session q display-message "session mode cancelled"
bind -T tmux-session Escape display-message "session mode cancelled"
