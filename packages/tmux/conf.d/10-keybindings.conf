# WezTerm-inspired root keybindings.

unbind C-b
set -g prefix M-\\
bind -T prefix M-\\ send-prefix

setw -g mode-keys vi

bind r run-shell "for file in 00-options.conf 10-keybindings.conf 11-keytables.conf 90-plugins.conf 20-status.conf; do tmux -S '#{socket_path}' source-file \"$HOME/.tmux.d/\$file\"; done" \; display-message "tmux config reloaded"

# Grouped entrypoints that mirror WezTerm leader tables.
bind t switch-client -T tmux-window
bind p switch-client -T tmux-pane
bind s switch-client -T tmux-session

# Direct navigation retained for frequent pane/window actions.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-, previous-window
bind -n M-. next-window
bind -n M-Enter resize-pane -Z
bind -n M-w kill-pane

# WezTerm-like utility entrypoints that map cleanly to tmux primitives.
bind -n F2 copy-mode
bind -n F3 choose-tree -Z
bind -n F4 choose-tree -Zw
bind -n F5 choose-tree -Zs
bind -n F6 choose-tree -Zs
bind -n M-f command-prompt -p "Search tmux scrollback" "copy-mode \; send-keys -X search-forward '%%'"
bind -n M-u copy-mode \; send-keys -X -N 5 scroll-up
bind -n M-d copy-mode \; send-keys -X -N 5 scroll-down
bind -n PageUp if-shell -F "#{pane_in_mode}" "send-keys -X page-up" "copy-mode -u"
bind -n PageDown if-shell -F "#{pane_in_mode}" "send-keys -X page-down" "send-keys PageDown"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
