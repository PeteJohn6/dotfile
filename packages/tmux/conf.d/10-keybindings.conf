# Minimal direct-navigation keybindings.

set -g prefix C-b
bind -T prefix C-b send-prefix

setw -g mode-keys vi

# Restore tmux defaults that were previously overridden.
bind p previous-window
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind s choose-tree -Zs
bind t clock-mode

# Remove old bindings from the previous layout when reloading config.
run-shell "tmux -S '#{socket_path}' list-keys -T prefix | grep -Fq 'M-\\\\' && tmux -S '#{socket_path}' unbind -T prefix 'M-\\\\' || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'M-Enter' && tmux -S '#{socket_path}' unbind -n M-Enter || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'M-f' && tmux -S '#{socket_path}' unbind -n M-f || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'M-u' && tmux -S '#{socket_path}' unbind -n M-u || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'M-d' && tmux -S '#{socket_path}' unbind -n M-d || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'PageUp' && tmux -S '#{socket_path}' unbind -n PageUp || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'PageDown' && tmux -S '#{socket_path}' unbind -n PageDown || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'F2' && tmux -S '#{socket_path}' unbind -n F2 || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'F3' && tmux -S '#{socket_path}' unbind -n F3 || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'F4' && tmux -S '#{socket_path}' unbind -n F4 || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'F5' && tmux -S '#{socket_path}' unbind -n F5 || true"
run-shell "tmux -S '#{socket_path}' list-keys -T root | grep -Fq 'F6' && tmux -S '#{socket_path}' unbind -n F6 || true"

# Direct navigation retained for frequent pane/window/session actions.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-, previous-window
bind -n M-. next-window
bind -n M-[ switch-client -p
bind -n M-] switch-client -n
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-window
