# Windows configuration
# This file is included from local.toml and overrides Windows-specific paths
# Do not define 'packages' here - only in local.toml


# Neovim package (Windows-specific path)
[nvim.files]
"packages/nvim" = "~/AppData/Local/nvim"

[powershell.files]
"packages/powershell/Microsoft.PowerShell_profile.ps1" = "~/OneDrive/Documents/PowerShell/Microsoft.PowerShell_profile.ps1"
"packages/powershell/profile.d" = "~/OneDrive/Documents/PowerShell/profile.d"

[alacritty.files]
"packages/alacritty/alacritty.toml.tmpl" = { type = "template", target = "~/AppData/Roaming/Alacritty/alacritty.toml" }
"packages/alacritty/wsl.toml" = "~/AppData/Roaming/Alacritty/wsl.toml"
"packages/alacritty/themes" = { type = "symbolic", target = "~/AppData/Roaming/Alacritty/themes" }

[wezterm.files]
"packages/wezterm" = "~/.config/wezterm"
